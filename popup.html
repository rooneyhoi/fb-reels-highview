<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FB Reels High View</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        font-size: 12px;
        padding: 8px;
        width: 420px;
        max-height: 600px;
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 8px;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 4px;
        text-align: left;
        font-size: 11px;
        word-break: break-all;
      }
      th {
        background: #f5f5f5;
      }
      #status {
        margin-top: 4px;
        font-size: 11px;
        color: #555;
      }
      .controls {
        display: flex;
        gap: 4px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 4px;
      }
      input[type='number'] {
        width: 90px;
        font-size: 11px;
      }
      button {
        font-size: 11px;
        padding: 3px 8px;
      }
      textarea {
        width: 100%;
        height: 120px;
        font-size: 11px;
        margin-top: 6px;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <label>
        Min views:
        <input id="minViews" type="number" value="300000" />
      </label>
      <button id="scanBtn">Scan Reels</button>
      <button id="copyMarkdownBtn" disabled>Copy Markdown</button>
      <button id="copyCsvBtn" disabled>Copy CSV</button>
      <button id="copySimpleBtn" disabled>Copy URL,Views</button>
    </div>

    <div id="status"></div>

    <table id="resultTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Views</th>
          <th>Raw</th>
          <th>URL</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <textarea
      id="exportText"
      readonly
      placeholder="Exported text (Markdown / CSV / URL,Views) will appear here..."
    ></textarea>

    <script src="popup.js"></script>
  </body>
</html>
